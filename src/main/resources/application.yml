spring:
  application:
    name: sportsbook
  datasource:
    url: jdbc:postgresql://localhost:5432/sportsbook
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

app:
  version: 0.0.1
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 900000 # 15 minutes

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
